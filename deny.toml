[graph]
all-features = true
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "wasm32-unknown-unknown" },
]

[advisories]
ignore = []
yanked = "deny"

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
# Workspace crates depend on each other via path dependencies on purpose.
# Keep the signal, but do not fail CI on the repo's own crate topology.
wildcards = "warn"
highlight = "all"
allow-workspace = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
