name: Bug report
description: Report a reproducible SP42 problem.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include tokens, cookies, private user data, or secrets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: List exact steps, commands, inputs, or URLs.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, browser, deployment mode, and relevant SP42 command.
      placeholder: |
        OS:
        rustc:
        browser:
        SP42_DEPLOYMENT_MODE:
        command:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact secrets before posting.
      render: text
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I have not included tokens, cookies, private user data, or secrets.
          required: true
