[build]
target = "index.html"
dist = "target/dist/sp42-app"
filehash = true
minify = "on_release"
public_url = "/"

[watch]
watch = [
  "crates/sp42-app/src",
  "crates/sp42-app/static",
  "crates/sp42-platform/src",
  "crates/sp42-citation/src",
  "crates/sp42-patrol/src",
  "crates/sp42-reporting/src",
  "crates/sp42-coordination/src",
  "crates/sp42-live/src",
  "crates/sp42-wiki/src",
  "crates/sp42-core/src",
  "crates/sp42-types/src",
]

[serve]
addresses = ["127.0.0.1"]
port = 4173
open = false

[[proxies]]
backend = "http://127.0.0.1:8788/operator"
rewrite = "/operator"

[[proxies]]
backend = "http://127.0.0.1:8788/dev"
rewrite = "/dev"

[[proxies]]
backend = "http://127.0.0.1:8788/healthz"
rewrite = "/healthz"

[[proxies]]
backend = "http://127.0.0.1:8788/runtime-config.js"
rewrite = "/runtime-config.js"

[[proxies]]
backend = "http://127.0.0.1:8788/coordination"
rewrite = "/coordination"

[[proxies]]
backend = "http://127.0.0.1:8788/debug"
rewrite = "/debug"

[[proxies]]
backend = "http://127.0.0.1:8788/actions"
rewrite = "/actions"

[[proxies]]
backend = "http://127.0.0.1:8788/auth"
rewrite = "/auth"

[[proxies]]
backend = "http://127.0.0.1:8788/wikis"
rewrite = "/wikis"
